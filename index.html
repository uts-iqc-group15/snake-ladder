<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake & Ladder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🐍 Snake & Ladder 🪜</h1>
    <div class="game-area">
      <canvas id="board" width="500" height="500"></canvas>
      <div class="controls">
        <div class="player-info">
          <div id="current-player" class="current-player">Player 1's Turn</div>
          <div class="positions">
            <span class="p1-badge">P1: <span id="p1-pos">0</span></span>
            <span class="p2-badge">P2: <span id="p2-pos">0</span></span>
          </div>
        </div>
        <div id="dice-area" class="dice-area">
          <div id="dice" class="dice">🎲</div>
          <div id="dice-result" class="dice-result"></div>
        </div>
        <button id="roll-btn" class="roll-btn">Roll Dice</button>
        <button id="reset-btn" class="reset-btn">New Game</button>
        <div id="message" class="message"></div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
